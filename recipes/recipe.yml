# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fedora-atomic-hyprland-kde
description: Custom Fedora Atomic OS with Hyprland and KDE

# Use wayblue's Hyprland + Nvidia image as the base (correct for T480 with MX150)
# wayblue-hyprland-nvidia includes proprietary Nvidia drivers out of the box
base-image: ghcr.io/wayblueorg/hyprland-nvidia
image-version: latest

modules:
  # ─── KDE Plasma via script (needs --allowerasing for Qt6 version conflict) ─
  - type: script
    scripts:
      - install-kde.sh

  # ─── Additional packages via dnf ──────────────────────────────────────────
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        # Terminal, shell & multiplexing
        - alacritty
        - tmux
        - zsh

        # Password management
        - pass
        - gnupg2

        # Search tools (fzf already bundled, ripgrep and fd-find are not)
        - ripgrep
        - fd-find

        # Clipboard history
        - cliphist

        # Screenshot annotation (grim + slurp already bundled)
        - swappy

        # Virtualisation
        - virt-manager
        - qemu-kvm
        - libvirt
        - libvirt-daemon-config-network
        - virt-install
        - bridge-utils

        # Git (often already present but explicit is fine)
        - git

        # Fonts
        - google-noto-fonts-all
        - liberation-fonts
        # Code New Roman — installed manually post-boot (see Phase 4.6)

        # Waydroid
        - waydroid

        # Misc
        - curl
        - wget
        - unzip
        - htop
        - fastfetch

  # ─── Enable services ───────────────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - libvirtd.service
        - waydroid-container.service

  # ─── Flatpak remotes ───────────────────────────────────────────────────────
  - type: default-flatpaks
    configurations:
      - scope: system
        repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
        repo-name: flathub
        install:
        - com.valvesoftware.Steam
        - org.freedesktop.Platform.VulkanLayer.MangoHud
        - com.usebottles.bottles
        - com.github.tchx84.Flatseal
        - com.discordapp.Discord
        - com.github.IsmaelMartinez.teams_for_linux
        - io.github.zen_browser.zen
        - org.chromium.Chromium
        - com.brave.Browser
        - org.freecadweb.FreeCAD
        - org.kicad.KiCad
        - com.vscodium.codium
        - org.eclipse.Java

  # ─── GTK / color scheme ───────────────────────────────────────────────────
  - type: gnome-extensions   # no-op if not gnome, harmless
    # We set dark theme via gsettings in dotfiles instead

  # ─── Signing ──────────────────────────────────────────────────────────────
  - type: signing
