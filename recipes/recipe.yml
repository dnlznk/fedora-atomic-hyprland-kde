---
name: fedora-atomic-hyprland-kde
description: Custom Fedora Atomic OS with Hyprland and KDE

# Use wayblue's Hyprland image as the base
base-image: ghcr.io/wayblueorg/hyprland-nvidia
image-version: latest

modules:
  # ─── RPM packages baked into the image ────────────────────────────────────
  - type: rpm-ostree
    install:
      # Hyprland ecosystem (wayblue base has hyprland, but we add companions)
      - waybar
      - rofi-wayland
      - waylock
      - hyprpaper          # wallpaper daemon
      - hypridle           # idle daemon
      - hyprpicker         # color picker
      - xdg-desktop-portal-hyprland

      # KDE Plasma (minimal — no games, no office, no extras)
      - plasma-desktop
      - plasma-nm            # network manager applet
      - plasma-pa            # audio applet
      - plasma-systemmonitor
      - dolphin              # file manager (minimal but very useful with HDMI)
      - kscreen              # display config (crucial for hotel room HDMI)
      - powerdevil           # power management
      - bluedevil            # bluetooth
      - kde-gtk-config       # GTK theming in KDE
      - sddm                 # display manager
      - sddm-kcm             # SDDM config in KDE settings

      # Terminal & shell utilities
      - kitty
      - tmux
      - vim
      - git
      - pass
      - gnupg2
      - fzf
      - ripgrep
      - fd-find
      - zsh

      # Wayland / display utilities
      - wl-clipboard
      - cliphist
      - grim                 # screenshot
      - slurp                # region select
      - swappy               # screenshot annotation
      - brightnessctl
      - playerctl

      # QEMU / virt-manager
      - virt-manager
      - qemu-kvm
      - libvirt
      - libvirt-daemon-config-network
      - virt-install
      - bridge-utils

      # Fonts (important for Waybar, Rofi icons)
      - noto-fonts
      - noto-fonts-emoji
      - liberation-fonts
      # Code New Roman is not in the Fedora repos — installed manually post-boot (see Phase 4.6)

      # Waydroid dependencies (kernel modules handled separately)
      - waydroid

      # Misc system tools
      - curl
      - wget
      - unzip
      - p7zip
      - htop
      - neofetch

    remove:
      # Kinoite ships a minimal set — only remove what's actually present by default
      - kwrite        # we use nvim / neovim
      - konsole       # we use kitty

  # Note: Since Fedora 40, Kinoite ships some apps (like Discover) as Fedora Flatpaks
  # rather than RPMs. To remove Discover post-install run:
  #   flatpak remove org.kde.discover
  # This cannot be done in the recipe's remove: block since it's not an RPM.

  # ─── Enable services ───────────────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - libvirtd.service
        - waydroid-container.service
        - sddm.service

  # ─── Flatpak remotes ───────────────────────────────────────────────────────
  - type: default-flatpaks
    notify: true
    system:
      repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub
      install:
        - com.valvesoftware.Steam
        - org.freedesktop.Platform.VulkanLayer.MangoHud
        - com.usebottles.bottles
        - com.github.tchx84.Flatseal
        - com.discordapp.Discord
        - com.github.IsmaelMartinez.teams_for_linux
        - io.github.zen_browser.zen
        - org.chromium.Chromium
        - com.brave.Browser
        - org.freecadweb.FreeCAD
        - org.kicad.KiCad
        - com.vscodium.codium
        - org.eclipse.Java
    user:
      repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub

  # ─── GTK / color scheme ───────────────────────────────────────────────────
  - type: gnome-extensions   # no-op if not gnome, harmless
    # We set dark theme via gsettings in dotfiles instead

  # ─── Signing ──────────────────────────────────────────────────────────────
  - type: signing
    key: https://raw.githubusercontent.com/dnlznk/fedora-atomic-hyprland-kde/main/cosign.pub
